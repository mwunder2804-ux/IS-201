<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Arial', sans-serif; background: #faf8ef; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem; min-height: 100vh; }
  #header { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 440px; margin-bottom: 1rem; }
  #title { font-size: 2.5rem; font-weight: 700; color: #776e65; }
  #scores { display: flex; gap: 8px; }
  .score-box { background: #b5a09a; border-radius: 6px; padding: 6px 16px; text-align: center; min-width: 70px; }
  .score-label { font-size: 10px; color: #f5ebe6; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .score-val { font-size: 18px; font-weight: 700; color: #fff; }
  #controls { display: flex; gap: 8px; margin-bottom: 1rem; width: 100%; max-width: 440px; justify-content: flex-end; align-items: center; }
  #msg { font-size: 14px; color: #776e65; flex: 1; }
  button { background: #8f7a66; color: #f9f6f2; border: none; border-radius: 6px; padding: 8px 18px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  button:hover { background: #7a6657; }
  #board-wrap { position: relative; width: 440px; max-width: 100%; }
  #grid { background: #bbada0; border-radius: 10px; padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; aspect-ratio: 1; }
  .cell { background: rgba(238,228,218,0.35); border-radius: 6px; }
  #tiles { position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; pointer-events: none; }
  .tile { display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: 700; font-size: 1.6rem; }
  .t2    { background: #eee4da; color: #776e65; }
  .t4    { background: #ede0c8; color: #776e65; }
  .t8    { background: #f2b179; color: #f9f6f2; }
  .t16   { background: #f59563; color: #f9f6f2; }
  .t32   { background: #f67c5f; color: #f9f6f2; }
  .t64   { background: #f65e3b; color: #f9f6f2; }
  .t128  { background: #edcf72; color: #f9f6f2; font-size: 1.3rem; }
  .t256  { background: #edcc61; color: #f9f6f2; font-size: 1.3rem; }
  .t512  { background: #edc850; color: #f9f6f2; font-size: 1.3rem; }
  .t1024 { background: #edc53f; color: #f9f6f2; font-size: 1.1rem; }
  .t2048 { background: #edc22e; color: #f9f6f2; font-size: 1.1rem; }
  .tsuper { background: #3c3a32; color: #f9f6f2; font-size: 0.95rem; }
  #overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(238,228,218,0.73); border-radius: 10px; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  #overlay.show { display: flex; }
  #overlay-msg { font-size: 1.8rem; font-weight: 700; color: #776e65; }
  #overlay-sub { font-size: 14px; color: #776e65; }
  #hint { font-size: 12px; color: #a09285; margin-top: 0.75rem; text-align: center; }
</style>
</head>
<body>
    <div class="return-container">
    <a href="fromscratch.html" class="btn-return">← Return to Project Home</a>
</div>
<br>
<br>


<div id="header">
  <div id="title">2048</div>
  <div id="scores">
    <div class="score-box"><div class="score-label">Score</div><div class="score-val" id="score">0</div></div>
    <div class="score-box"><div class="score-label">Best</div><div class="score-val" id="best">0</div></div>
  </div>
</div>

<div id="controls">
  <div id="msg">Join the tiles, get to <strong>2048!</strong></div>
  <button id="newbtn">New Game</button>
</div>

<div id="board-wrap">
  <div id="grid">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
  </div>
  <div id="tiles"></div>
  <div id="overlay">
    <div id="overlay-msg"></div>
    <div id="overlay-sub"></div>
    <button id="overlay-btn">Try Again</button>
  </div>
</div>

<div id="hint">Use arrow keys or swipe to play</div>

<script>
  let board, score, best = 0, won = false, over = false;
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const tilesEl = document.getElementById('tiles');
  const overlay = document.getElementById('overlay');
  const ovMsg   = document.getElementById('overlay-msg');
  const ovSub   = document.getElementById('overlay-sub');

  function newGame() {
    board = Array.from({length: 4}, () => Array(4).fill(0));
    score = 0; won = false; over = false;
    overlay.classList.remove('show');
    addRandom(); addRandom();
    render();
  }

  function addRandom() {
    const empties = [];
    for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (!board[r][c]) empties.push([r, c]);
    if (!empties.length) return;
    const [r, c] = empties[Math.floor(Math.random() * empties.length)];
    board[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function tileClass(v) {
    if (v <= 2048) return 't' + v;
    return 'tsuper';
  }

  function render() {
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    tilesEl.innerHTML = '';
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 4; c++) {
        if (board[r][c]) {
          const t = document.createElement('div');
          t.className = 'tile ' + tileClass(board[r][c]);
          t.style.gridRow = (r + 1);
          t.style.gridColumn = (c + 1);
          t.textContent = board[r][c];
          tilesEl.appendChild(t);
        }
      }
    }
  }

  function slide(row) {
    let arr = row.filter(x => x);
    let gained = 0;
    for (let i = 0; i < arr.length - 1; i++) {
      if (arr[i] === arr[i + 1]) {
        arr[i] *= 2;
        gained += arr[i];
        arr.splice(i + 1, 1);
      }
    }
    while (arr.length < 4) arr.push(0);
    return [arr, gained];
  }

  function move(dir) {
    if (over) return;
    let moved = false;
    let gained = 0;
    let newBoard = board.map(r => [...r]);

    if (dir === 'left') {
      for (let r = 0; r < 4; r++) {
        const [res, g] = slide(board[r]);
        if (res.join() !== board[r].join()) moved = true;
        newBoard[r] = res; gained += g;
      }
    } else if (dir === 'right') {
      for (let r = 0; r < 4; r++) {
        const [res, g] = slide([...board[r]].reverse());
        const row = res.reverse();
        if (row.join() !== board[r].join()) moved = true;
        newBoard[r] = row; gained += g;
      }
    } else if (dir === 'up') {
      for (let c = 0; c < 4; c++) {
        const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
        const [res, g] = slide(col);
        for (let r = 0; r < 4; r++) { if (res[r] !== board[r][c]) moved = true; newBoard[r][c] = res[r]; }
        gained += g;
      }
    } else if (dir === 'down') {
      for (let c = 0; c < 4; c++) {
        const col = [board[3][c], board[2][c], board[1][c], board[0][c]];
        const [res, g] = slide(col);
        const rev = res.reverse();
        for (let r = 0; r < 4; r++) { if (rev[r] !== board[r][c]) moved = true; newBoard[r][c] = rev[r]; }
        gained += g;
      }
    }

    if (!moved) return;
    board = newBoard;
    score += gained;

    if (!won) {
      for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
        if (board[r][c] === 2048) {
          won = true;
          ovMsg.textContent = 'You Win!';
          ovSub.textContent = 'Score: ' + score + ' — keep going or start fresh';
          overlay.classList.add('show');
        }
      }
    }

    addRandom();

    if (!canMove()) {
      over = true;
      ovMsg.textContent = 'Game Over';
      ovSub.textContent = 'Final score: ' + score;
      overlay.classList.add('show');
    }

    render();
  }

  function canMove() {
    for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
      if (!board[r][c]) return true;
      if (c < 3 && board[r][c] === board[r][c + 1]) return true;
      if (r < 3 && board[r][c] === board[r + 1][c]) return true;
    }
    return false;
  }

  document.addEventListener('keydown', e => {
    const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
    if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
  });

  let tx = 0, ty = 0;
  document.getElementById('board-wrap').addEventListener('touchstart', e => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  }, { passive: true });
  document.getElementById('board-wrap').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
  }, { passive: true });

  document.getElementById('newbtn').addEventListener('click', newGame);
  document.getElementById('overlay-btn').addEventListener('click', newGame);

  newGame();
</script>

</body>
</html>
